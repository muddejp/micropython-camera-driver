name: Build pyDrone Camera Firmware (ESP32-S3)

on:
  workflow_dispatch:   # trigger manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.2

    steps:
      - name: Checkout camera driver
        uses: actions/checkout@v4.2.2

      - name: Fix git ownership (container uid mismatch)
        run: git config --global --add safe.directory '*'

      - name: Clone MicroPython v1.23.0
        run: |
          git clone --depth 1 -b v1.23.0 \
            https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init lib/micropython-lib

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Fetch ESP32 port submodules
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 submodules

      - name: Set up camera managed components
        run: |
          MANAGED_DIR=$GITHUB_WORKSPACE/micropython/ports/esp32/managed_components
          mkdir -p $MANAGED_DIR

          # Clone esp32-camera into managed_components so the lemariva cmake
          # paths (${CMAKE_SOURCE_DIR}/managed_components/...) work unchanged.
          # Delete its idf_component.yml so the IDF component manager does not
          # try to re-resolve managed deps at build time.
          git clone --depth 1 \
            https://github.com/espressif/esp32-camera.git \
            $MANAGED_DIR/espressif__esp32-camera
          rm -f $MANAGED_DIR/espressif__esp32-camera/idf_component.yml

          # esp-jpeg is a built-in IDF component that the Docker image omits.
          # Sparse-clone just that subdirectory from the ESP-IDF v5.2.2 tag.
          echo "=== sparse-cloning esp-jpeg from ESP-IDF v5.2.2 ==="
          git clone --depth 1 --filter=blob:none --sparse \
            -b v5.2.2 \
            https://github.com/espressif/esp-idf.git \
            /tmp/esp-idf-sparse
          cd /tmp/esp-idf-sparse
          git sparse-checkout set components/esp-jpeg

          echo "=== esp-jpeg directory contents ==="
          ls components/esp-jpeg/ 2>/dev/null || echo "(not found)"

          if [ -d "components/esp-jpeg" ] && find components/esp-jpeg -name "*.h" | grep -q .; then
            cp -r components/esp-jpeg $MANAGED_DIR/espressif__esp-jpeg
            echo "esp-jpeg placed in managed_components"
          else
            # If sparse checkout found nothing, try one level deeper
            echo "Checking for esp-jpeg in subdirectories..."
            find /tmp/esp-idf-sparse -name "jpeg_decoder.h" 2>/dev/null || echo "jpeg_decoder.h not found anywhere in sparse clone"
            find /tmp/esp-idf-sparse/components -maxdepth 1 -type d 2>/dev/null | head -20 || echo "(no components dir)"

            # Fallback: upgrade pip + idf-component-manager and use it to download
            echo "=== fallback: pip upgrade + idf-component-manager ==="
            . $IDF_PATH/export.sh
            pip install --upgrade 'idf-component-manager>=1.4.0' --quiet
            TMPPROJ=$(mktemp -d)
            mkdir -p $TMPPROJ/main
            printf 'dependencies:\n  idf: ">=5.0.0"\n  espressif/esp-jpeg:\n    version: ">=2.0.0"\n' \
              > $TMPPROJ/main/idf_component.yml
            cd $TMPPROJ
            idf-component-manager update-dependencies 2>&1 || true
            if [ -d "$TMPPROJ/managed_components/espressif__esp-jpeg" ]; then
              cp -r "$TMPPROJ/managed_components/espressif__esp-jpeg" \
                $MANAGED_DIR/espressif__esp-jpeg
              echo "esp-jpeg downloaded via idf-component-manager"
            else
              echo "ERROR: could not obtain esp-jpeg by any method"
              exit 1
            fi
          fi

          cd $GITHUB_WORKSPACE

          # Symlink jpeg_decoder.h into esp32-camera's conversions/include so
          # img_converters.h's bare #include "jpeg_decoder.h" resolves without
          # adding esp-jpeg to the cmake include paths.
          JPEG_H=$(find $MANAGED_DIR/espressif__esp-jpeg -name "jpeg_decoder.h" | head -1)
          echo "jpeg_decoder.h location: $JPEG_H"
          if [ -n "$JPEG_H" ]; then
            ln -sf "$JPEG_H" \
              $MANAGED_DIR/espressif__esp32-camera/conversions/include/jpeg_decoder.h
            echo "Symlinked OK"
          else
            echo "WARNING: jpeg_decoder.h not found in esp-jpeg"
            find $MANAGED_DIR/espressif__esp-jpeg -name "*.h" | head -20
          fi

          echo "=== managed_components ==="
          ls $MANAGED_DIR/

      - name: Patch cmake — enable camera module
        run: |
          echo "=== ORIGINAL src/micropython.cmake ==="
          cat src/micropython.cmake

          sed -i \
            's|target_compile_definitions(usermod_esp32camera INTERFACE)|target_compile_definitions(usermod_esp32camera INTERFACE MODULE_CAMERA_ENABLED=1)|g' \
            src/micropython.cmake

          echo "=== PATCHED src/micropython.cmake ==="
          cat src/micropython.cmake

      - name: Build camera firmware for ESP32-S3 + Octal PSRAM
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 \
            BOARD=ESP32_GENERIC_S3 \
            BOARD_VARIANT=SPIRAM_OCT \
            USER_C_MODULES=$GITHUB_WORKSPACE/src/micropython.cmake

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: pydrone-camera-firmware-esp32s3
          path: micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
          retention-days: 30
