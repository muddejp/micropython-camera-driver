name: Build pyDrone Camera Firmware (ESP32-S3)

on:
  workflow_dispatch:   # trigger manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.2

    steps:
      - name: Checkout camera driver
        uses: actions/checkout@v4.2.2

      - name: Fix git ownership (container uid mismatch)
        run: git config --global --add safe.directory '*'

      - name: Clone MicroPython v1.23.0
        run: |
          git clone --depth 1 -b v1.23.0 \
            https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init lib/micropython-lib

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Fetch ESP32 port submodules
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 submodules

      - name: Set up camera managed components
        run: |
          . $IDF_PATH/export.sh
          MANAGED_DIR=$GITHUB_WORKSPACE/micropython/ports/esp32/managed_components
          mkdir -p $MANAGED_DIR

          echo "=== idf-component-manager version ==="
          idf-component-manager --version 2>/dev/null \
            || python3 -m idf_component_manager --version 2>/dev/null \
            || echo "CLI not found — will try Python API"

          # Clone esp32-camera directly into managed_components so the
          # lemariva cmake paths (${CMAKE_SOURCE_DIR}/managed_components/...) work as-is
          git clone --depth 1 \
            https://github.com/espressif/esp32-camera.git \
            $MANAGED_DIR/espressif__esp32-camera

          # Use idf-component-manager to download esp-jpeg (required by esp32-camera)
          # Run from a temp directory with a minimal project manifest
          TMPPROJ=$(mktemp -d)
          mkdir -p $TMPPROJ/main
          printf 'dependencies:\n  idf: ">=5.0.0"\n  espressif/esp-jpeg:\n    version: ">=2.0.0"\n' \
            > $TMPPROJ/main/idf_component.yml

          echo "=== downloading esp-jpeg via component manager ==="
          cd $TMPPROJ
          idf-component-manager update-dependencies 2>&1 \
            || python3 -m idf_component_manager update-dependencies 2>&1 \
            || echo "WARN: idf-component-manager update-dependencies failed"

          echo "=== temp managed_components ==="
          ls $TMPPROJ/managed_components/ 2>/dev/null || echo "(none)"

          if [ -d "$TMPPROJ/managed_components/espressif__esp-jpeg" ]; then
            cp -r $TMPPROJ/managed_components/espressif__esp-jpeg \
              $MANAGED_DIR/espressif__esp-jpeg
            echo "esp-jpeg copied to managed_components"
          else
            echo "idf-component-manager did not download esp-jpeg — trying direct clone"
            # Fallback: attempt to clone from GitHub (available as part of idf-extra-components)
            git clone --depth 1 --filter=blob:none --sparse \
              https://github.com/espressif/idf-extra-components.git /tmp/idf-extra 2>/dev/null
            cd /tmp/idf-extra
            git sparse-checkout set esp-jpeg 2>/dev/null
            if [ -d "/tmp/idf-extra/esp-jpeg" ]; then
              cp -r /tmp/idf-extra/esp-jpeg $MANAGED_DIR/espressif__esp-jpeg
              echo "esp-jpeg cloned from idf-extra-components"
            else
              echo "ERROR: could not obtain esp-jpeg by any method"
              exit 1
            fi
          fi

          echo "=== managed_components ==="
          ls $MANAGED_DIR/
          find $MANAGED_DIR -name "jpeg_decoder.h" 2>/dev/null || echo "jpeg_decoder.h still not found"

      - name: Patch cmake — enable camera module
        run: |
          echo "=== ORIGINAL src/micropython.cmake ==="
          cat src/micropython.cmake

          # Enable the MicroPython camera module flag
          # (include paths already point to managed_components — no change needed)
          sed -i \
            's|target_compile_definitions(usermod_esp32camera INTERFACE)|target_compile_definitions(usermod_esp32camera INTERFACE MODULE_CAMERA_ENABLED=1)|g' \
            src/micropython.cmake

          echo "=== PATCHED src/micropython.cmake ==="
          cat src/micropython.cmake

      - name: Build camera firmware for ESP32-S3 + Octal PSRAM
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 \
            BOARD=ESP32_GENERIC_S3 \
            BOARD_VARIANT=SPIRAM_OCT \
            USER_C_MODULES=$GITHUB_WORKSPACE/src/micropython.cmake

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: pydrone-camera-firmware-esp32s3
          path: micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
          retention-days: 30
