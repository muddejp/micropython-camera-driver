name: Build pyDrone Camera Firmware (01Studio)

on:
  workflow_dispatch:   # trigger manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v4.4.2

    steps:
      - name: Checkout (workflow repo)
        uses: actions/checkout@v4.2.2

      - name: Fix git ownership (container uid mismatch)
        run: git config --global --add safe.directory '*'

      - name: Clone 01Studio MicroPython fork
        run: |
          git clone --depth 1 \
            https://github.com/01studio-lab/micropython.git

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Fetch ESP32 port submodules
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 submodules || echo "Some submodules skipped"
          # berkeley-db is needed by modbtree.c; the pinned commit isn't shallow-fetchable so clone HEAD
          if [ ! -d micropython/lib/berkeley-db-1.xx ]; then
            git clone --depth 1 https://github.com/pfalcon/berkeley-db-1.xx.git \
              micropython/lib/berkeley-db-1.xx || echo "WARNING: berkeley-db clone failed"
          fi

      - name: Disable AI module (requires esp-dl, not needed for drone+camera)
        run: |
          rm -rf micropython/ports/esp32/mpy-ai
          python3 -c "
          import os
          for root, dirs, files in os.walk('micropython/ports/esp32'):
              for fname in files:
                  if fname == 'CMakeLists.txt' or fname.endswith('.cmake'):
                      path = os.path.join(root, fname)
                      with open(path) as f:
                          c = f.read()
                      orig = c
                      # Replace in-place so closing ) on the same line is preserved
                      c = c.replace('mpy-ai', '').replace('mpy_ai', '')
                      c = c.replace('esp-dl', '').replace('esp_dl', '')
                      c = c.replace('esp-code-scanner', '').replace('esp_code_scanner', '')
                      if c != orig:
                          print('Patched:', path)
                          with open(path, 'w') as f:
                              f.write(c)
          "

      - name: Build PYDRONE firmware
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 BOARD=PYDRONE

      - name: Dump build error logs
        if: failure()
        run: |
          BUILD=micropython/ports/esp32/build-PYDRONE
          echo "=== CMakeError.log (tail) ==="
          tail -100 $BUILD/CMakeFiles/CMakeError.log 2>/dev/null || echo "(not found)"
          echo "=== idf_py_stderr_output ==="
          find $BUILD/log -name 'idf_py_stderr_output_*' -exec cat {} \; 2>/dev/null | tail -300
          echo "=== ninja build log (tail) ==="
          find $BUILD -name '.ninja_log' -exec tail -20 {} \; 2>/dev/null || echo "(not found)"
          echo "=== QSTR extraction error (qstr.i.last) ==="
          cat $BUILD/genhdr/qstr.i.last 2>/dev/null | tail -50 || echo "(not found)"
          echo "=== last 50 lines of any .o.err files ==="
          find $BUILD -name '*.o.err' 2>/dev/null | xargs -I{} sh -c 'echo "--- {} ---"; tail -30 {}' 2>/dev/null | head -200 || echo "(no .o.err files)"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: pydrone-firmware-01studio
          path: micropython/ports/esp32/build-PYDRONE/firmware.bin
          retention-days: 30
