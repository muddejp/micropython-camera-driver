name: Build pyDrone Camera Firmware (ESP32-S3)

on:
  workflow_dispatch:   # trigger manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.2

    steps:
      - name: Checkout camera driver
        uses: actions/checkout@v4.2.2

      - name: Fix git ownership (container uid mismatch)
        run: git config --global --add safe.directory '*'

      - name: Add esp32-camera to IDF components
        run: |
          # Clone into IDF so it's auto-discovered as a regular component
          git clone --depth 1 \
            https://github.com/espressif/esp32-camera.git \
            $IDF_PATH/components/esp32-camera

          # Remove managed-component manifest so IDF treats this as a plain
          # component and doesn't try to resolve esp-jpeg via component manager
          # (which would print BUG: component_requirements.py errors)
          rm -f $IDF_PATH/components/esp32-camera/idf_component.yml

          echo "=== esp32-camera cloned ==="
          ls $IDF_PATH/components/esp32-camera/

      - name: Resolve jpeg_decoder.h (required by img_converters.h)
        run: |
          echo "=== Searching IDF for jpeg_decoder.h ==="
          find $IDF_PATH -name "jpeg_decoder.h" 2>/dev/null || true

          JPEG_H=$(find $IDF_PATH -name "jpeg_decoder.h" 2>/dev/null | head -1)
          DEST=$IDF_PATH/components/esp32-camera/conversions/include/jpeg_decoder.h

          if [ -n "$JPEG_H" ]; then
            echo "Found: $JPEG_H"
            ln -sf "$JPEG_H" "$DEST"
            echo "Symlinked OK"
          else
            echo "jpeg_decoder.h not found in IDF — writing minimal stub via printf"
            printf '%s\n' \
              '#pragma once' \
              '#include <stdint.h>' \
              '#include <stddef.h>' \
              'typedef enum { JPEG_IMAGE_FORMAT_RGB888 = 0 } jpeg_image_format_t;' \
              'typedef struct {' \
              '    const uint8_t *indata; size_t indata_size;' \
              '    uint8_t **outbuf; size_t *outbuf_size;' \
              '    jpeg_image_format_t out_format;' \
              '} esp_jpeg_image_cfg_t;' \
              'typedef int esp_jpeg_image_output_t;' \
              'static inline int esp_jpeg_decode(esp_jpeg_image_cfg_t *c, esp_jpeg_image_output_t *o) { return -1; }' \
              > "$DEST"
            echo "Stub written"
          fi

          echo "=== conversions/include after ==="
          ls -la $IDF_PATH/components/esp32-camera/conversions/include/

      - name: Clone MicroPython v1.23.0
        run: |
          git clone --depth 1 -b v1.23.0 \
            https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init lib/micropython-lib

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Fetch ESP32 port submodules
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 submodules

      - name: Patch cmake — IDF paths and enable module
        run: |
          echo "=== ORIGINAL src/micropython.cmake ==="
          cat src/micropython.cmake

          # Redirect all include paths from managed_components to the IDF component
          sed -i \
            's|${CMAKE_SOURCE_DIR}/managed_components/espressif__esp32-camera|${IDF_PATH}/components/esp32-camera|g' \
            src/micropython.cmake

          # Enable the MicroPython camera module
          sed -i \
            's|target_compile_definitions(usermod_esp32camera INTERFACE)|target_compile_definitions(usermod_esp32camera INTERFACE MODULE_CAMERA_ENABLED=1)|g' \
            src/micropython.cmake

          echo "=== PATCHED src/micropython.cmake ==="
          cat src/micropython.cmake

      - name: Build camera firmware for ESP32-S3 + Octal PSRAM
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 \
            BOARD=ESP32_GENERIC_S3 \
            BOARD_VARIANT=SPIRAM_OCT \
            USER_C_MODULES=$GITHUB_WORKSPACE/src/micropython.cmake

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: pydrone-camera-firmware-esp32s3
          path: micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
          retention-days: 30
