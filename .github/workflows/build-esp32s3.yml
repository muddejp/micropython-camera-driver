name: Build pyDrone Camera Firmware (01Studio)

on:
  workflow_dispatch:   # trigger manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v4.4.2

    steps:
      - name: Checkout (workflow repo)
        uses: actions/checkout@v4.2.2

      - name: Fix git ownership (container uid mismatch)
        run: git config --global --add safe.directory '*'

      - name: Clone 01Studio MicroPython fork
        run: |
          git clone --depth 1 \
            https://github.com/01studio-lab/micropython.git

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Fetch ESP32 port submodules
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 submodules || echo "Some submodules skipped"
          # berkeley-db: check for the actual source file (not just directory) because
          # 'make submodules' may create an empty placeholder dir for a pinned commit that
          # can't be shallow-fetched, causing a bare directory-check to skip the clone.
          # Fetch the EXACT berkeley-db commit pinned by the 01Studio micropython fork.
          # 'make submodules' fails because that commit isn't at a branch tip, so we
          # use git-init + fetch-by-SHA which always works for reachable objects.
          BERK_SHA=fe920afb7e901f2a2d512384d5e822aed3717a3f
          if [ ! -f micropython/lib/berkeley-db-1.xx/btree/bt_close.c ]; then
            rm -rf micropython/lib/berkeley-db-1.xx
            git init micropython/lib/berkeley-db-1.xx
            git -C micropython/lib/berkeley-db-1.xx remote add origin \
              https://github.com/pfalcon/berkeley-db-1.xx.git
            git -C micropython/lib/berkeley-db-1.xx fetch --depth 1 origin $BERK_SHA
            git -C micropython/lib/berkeley-db-1.xx checkout FETCH_HEAD
            echo "berkeley-db at $BERK_SHA: $(ls micropython/lib/berkeley-db-1.xx/btree/ | head -3)"
          else
            echo "berkeley-db already present"
          fi
          # mpool.h includes <sys/queue.h> for CIRCLEQ_ENTRY/CIRCLEQ_HEAD, but ESP32
          # newlib doesn't provide them.  PORT/include/queue.h has them; shadow sys/ so
          # the -I PORT/include flag intercepts the angle-bracket include.
          mkdir -p micropython/lib/berkeley-db-1.xx/PORT/include/sys
          printf '#include "../queue.h"\n' \
            > micropython/lib/berkeley-db-1.xx/PORT/include/sys/queue.h

      - name: Patch cmake (remove AI/scanner components that aren't in IDF container)
        run: |
          rm -rf micropython/ports/esp32/mpy-ai
          python3 -c "
          import os
          for root, dirs, files in os.walk('micropython/ports/esp32'):
              for fname in files:
                  if fname == 'CMakeLists.txt' or fname.endswith('.cmake'):
                      path = os.path.join(root, fname)
                      with open(path) as f:
                          c = f.read()
                      orig = c
                      c = c.replace('mpy-ai', '').replace('mpy_ai', '')
                      c = c.replace('esp-dl', '').replace('esp_dl', '')
                      c = c.replace('esp-code-scanner', '').replace('esp_code_scanner', '')
                      if c != orig:
                          print('Patched:', path)
                          with open(path, 'w') as f:
                              f.write(c)
          "

      - name: Build PYDRONE firmware
        run: |
          . $IDF_PATH/export.sh
          make -C micropython/ports/esp32 BOARD=PYDRONE 2>&1 | tee /tmp/pydrone_build.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Dump build error logs
        if: failure()
        run: |
          BUILD=micropython/ports/esp32/build-PYDRONE
          echo "=== Linker/compiler errors (grep) ==="
          grep -E "undefined reference|error:|FAILED:|cannot find -l|multiple definition" \
            /tmp/pydrone_build.log | grep -v "^--\|cmake\|\[.*\]" | head -80 \
            2>/dev/null || echo "(not found)"
          echo "=== Lines after FAILED: micropython.elf ==="
          grep -A 50 "FAILED: micropython.elf" /tmp/pydrone_build.log 2>/dev/null \
            | grep -v "^: &&\|esp-idf/\|libbt\|libm\|libphy\|libwifi\|libcoexist\|libnet\|libpp\|libsmartconfig\|libwapi\|libespnow\|libmesh\|libcore" \
            | head -80 || echo "(not found)"
          echo "=== CMakeError.log (tail) ==="
          tail -100 $BUILD/CMakeFiles/CMakeError.log 2>/dev/null || echo "(not found)"
          echo "=== idf_py_stderr_output (first 150 lines) ==="
          find $BUILD/log -name 'idf_py_stderr_output_*' -exec cat {} \; 2>/dev/null | head -150
          echo "=== idf_py_stderr_output (last 150 lines) ==="
          find $BUILD/log -name 'idf_py_stderr_output_*' -exec cat {} \; 2>/dev/null | tail -150
          echo "=== ninja build log (tail) ==="
          find $BUILD -name '.ninja_log' -exec tail -20 {} \; 2>/dev/null || echo "(not found)"
          echo "=== QSTR extraction error (qstr.i.last) ==="
          cat $BUILD/genhdr/qstr.i.last 2>/dev/null | tail -50 || echo "(not found)"
          echo "=== last 50 lines of any .o.err files ==="
          find $BUILD -name '*.o.err' 2>/dev/null | xargs -I{} sh -c 'echo "--- {} ---"; tail -30 {}' 2>/dev/null | head -200 || echo "(no .o.err files)"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: pydrone-firmware-01studio
          path: micropython/ports/esp32/build-PYDRONE/firmware.bin
          retention-days: 30
